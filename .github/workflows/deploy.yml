name: Mern Docker CI/CD

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
   

    steps:

      - name: checkout code
        uses: actions/checkout@v4

      - name: create backend env
        run: |
          echo "PORT=${{ secrets.PORT }}" >> backend/.env
          echo "MONGO_URI=${{ secrets.MONGO_URI }}" >> backend/.env
          echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" >> backend/.env
          echo "ADMIN_EMAIL=${{ secrets.ADMIN_EMAIL }}" >> backend/.env
          echo "FRONTEND_URL=${{ secrets.FRONTEND_URL }}" >> backend/.env
          echo "CLOUDINARY_CLOUD_NAME=${{ secrets.CLOUDINARY_CLOUD_NAME }}" >> backend/.env
          echo "CLOUDINARY_KEY=${{ secrets.CLOUDINARY_KEY }}" >> backend/.env
          echo "CLOUDINARY_SECRET=${{ secrets.CLOUDINARY_SECRET }}" >> backend/.env

      - name: create frontend env
        run: |
          echo "VITE_API_URL=${{secrets.VITE_API_URL}}" >> frontend/.env    

      - name: build backend image
        run: docker build -t backend ./backend

      - name: build frontend image
        run: docker build -t frontend ./frontend  

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Tag images
        run: |
          docker tag backend ${{ vars.DOCKERHUB_USERNAME }}/lms-backend:latest
          docker tag frontend ${{ vars.DOCKERHUB_USERNAME }}/lms-frontend:latest

      - name: push images
        run: |
          docker push ${{ vars.DOCKERHUB_USERNAME }}/lms-backend:latest
          docker push ${{ vars.DOCKERHUB_USERNAME }}/lms-frontend:latest


